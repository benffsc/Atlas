<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beacon — Gala Walkthrough</title>
  <link rel="stylesheet" href="/walkthrough/styles.css" />
</head>
<body>
  <!--
    ╔══════════════════════════════════════════════════════════════════╗
    ║  BEACON GALA WALKTHROUGH — Dom's Design                         ║
    ║                                                                  ║
    ║  Each slide is a full-screen image from Dom's Figma designs.    ║
    ║  To swap a slide: replace the PNG in assets/ folder.            ║
    ║  To edit text overlaid on a slide: change the HTML below.       ║
    ║  To add a slide: copy a <section> block, add a new image.      ║
    ║  To change transitions: edit styles.css.                        ║
    ║                                                                  ║
    ║  Slides are exported from Figma at 1920x1080 (16:9).           ║
    ║  Node IDs for re-export:                                        ║
    ║    Slide 0 (Title):   124:8832                                  ║
    ║    Slide 1 (Find):    116:8440                                  ║
    ║    Slide 2 (Fix):     119:8489                                  ║
    ║    Slide 3 (Return):  119:8545                                  ║
    ║    Slide 4 (Analyze): 119:8565                                  ║
    ║    Slide 5 (CTA):     119:8584                                  ║
    ╚══════════════════════════════════════════════════════════════════╝
  -->
  <div class="walkthrough">
    <div class="slides" id="slides">

      <!-- SLIDE 0: Title -->
      <section class="slide">
        <img src="/walkthrough/assets/slide-0-title.jpg" alt="Beacon — The next-generation technology for humane cat population reduction" class="slide-img" />
      </section>

      <!-- SLIDE 1: Find -->
      <section class="slide">
        <img src="/walkthrough/assets/slide-1-find.jpg" alt="Find — Every cat counts" class="slide-img" />
      </section>

      <!-- SLIDE 2: Fix -->
      <section class="slide">
        <img src="/walkthrough/assets/slide-2-fix.jpg" alt="Fix — Data-backed care" class="slide-img" />
      </section>

      <!-- SLIDE 3: Return -->
      <section class="slide">
        <img src="/walkthrough/assets/slide-3-return.jpg" alt="Return — One down, many more to go" class="slide-img" />
      </section>

      <!-- SLIDE 4: Analyze -->
      <section class="slide">
        <img src="/walkthrough/assets/slide-4-analyze.jpg" alt="Analyze — One down, many more to go" class="slide-img" />
      </section>

      <!-- SLIDE 5: CTA -->
      <section class="slide">
        <img src="/walkthrough/assets/slide-5-cta.jpg" alt="Be part of the solution" class="slide-img" />
      </section>

    </div>

    <!-- Navigation — bottom left -->
    <div class="nav" id="nav">
      <button class="nav-btn" id="nav-prev" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
        Prev
      </button>
      <span class="nav-counter" id="nav-counter">1/5</span>
      <button class="nav-btn" id="nav-next">
        Next
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
      </button>
    </div>

    <button class="exit-btn" id="exit-btn">ESC to exit</button>
  </div>

  <script src="/walkthrough/script.js"></script>
</body>
</html>
